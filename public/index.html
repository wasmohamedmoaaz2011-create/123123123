<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />

    <!-- ============================================ -->
    <!-- PWA & Mobile Essential Tags                  -->
    <!-- ============================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="background-color" content="#0f172a" />

    <!-- تمنع بار العنوان يظهر - بيبان زي App حقيقي -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari - خاص بالايفون -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="مس الاء رمضان" />

    <!-- Windows Phone -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- منع الـ format detection على الموبايل -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ============================================ -->
    <!-- Icons & Manifest                             -->
    <!-- ============================================ -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Apple Touch Icons (مهمة جداً للايفون) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />

    <!-- ============================================ -->
    <!-- iOS Splash Screens (بيخلي شاشة اللودينج حلوة) -->
    <!-- ============================================ -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ============================================ -->
    <!-- SEO & Description                            -->
    <!-- ============================================ -->
    <meta name="description" content="سيستم مس الاء رمضان لإدارة المجموعات والطلاب والدرجات والحضور والمدفوعات" />

    <!-- Open Graph (للمشاركة على واتساب وسوشيال ميديا) -->
    <meta property="og:title" content="سيستم مس الاء رمضان" />
    <meta property="og:description" content="سيستم مس الاء رمضان لإدارة المجموعات والطلاب والدرجات والحضور والمدفوعات" />
    <meta property="og:type" content="website" />

    <!-- ============================================ -->
    <!-- Fonts                                        -->
    <!-- ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <title>سيستم مس الاء رمضان</title>

    <!-- ============================================ -->
    <!-- Inline Critical CSS للـ Splash Screen         -->
    <!-- ============================================ -->
    <style>
      /* منع الـ bounce effect على iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      /* Safe area للأجهزة بـ notch */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* منع تحديد النص بالإصبع على الموبايل */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      /* Loading screen */
      #root:empty::before {
        content: '';
        display: block;
        position: fixed;
        inset: 0;
        background: #0f172a;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <noscript>يجب عليك تفعيل جافا سكريبت لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
  </body>
</html>
